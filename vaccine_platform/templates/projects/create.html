{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <h1 class="mb-3">
            Create Research Project
        </h1>

        <p class="text-muted">
            Create a new Reverse Vaccinology Project.
        </p>

        <hr>

        <div class="card shadow-sm">

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Project Name
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="project_name"
                            placeholder="Example: Novel Bacterial Vaccine"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Organism
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="organism"
                            placeholder="Example: Klebsiella pneumoniae"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea
                            class="form-control"
                            name="description"
                            rows="5"
                            placeholder="Enter a short description about this research project..."
                        ></textarea>

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg">

                            Save Project

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
