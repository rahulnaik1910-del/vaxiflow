{% extends "base.html" %}

{% block content %}

<h1>📂 Upload Genome</h1>

<p class="text-muted">

Project:
<strong>{{ project.project_name }}</strong>

</p>

<hr>

<div class="card shadow p-4">

    {% if error %}

    <div class="alert alert-danger">

        {{ error }}

    </div>

    {% endif %}

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">

                Select Genome File

            </label>

            <input
                type="file"
                class="form-control"
                name="genome_file"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Upload Genome

        </button>

    </form>

</div>

<br>

<a
href="/projects/{{ project.id }}/"
class="btn btn-secondary">

← Back to Project

</a>

{% endblock %}
